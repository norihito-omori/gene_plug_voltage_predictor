model_type: EP370G
# specs/input_schema.md §4: EP370G の mcnkind_id コード。
expected_mcnkind_id: 54
rated_power_kw: 370
input_dir: E:/gene/input/EP370G_orig
dataset_name: ep370g-baseline
# Phase 0 対象 27 機場（30 機場中 9570/9571/9850 を EP370G_EXCLUDED_LOCATIONS で除外）。
target_locations:
  - 5630
  - 8950
  - 9110
  - 9111
  - 9120
  - 9220
  - 9221
  - 9230
  - 9240
  - 9290
  - 9380
  - 9381
  - 9410
  - 9420
  - 9421
  - 9440
  - 9540
  - 9580
  - 9581
  - 9610
  - 9611
  - 9690
  - 9720
  - 9760
  - 9780
  - 9820
steps:
  # L-09 (ADR-012): 機場別の開始日時 cutoff 以前の行を除外。
  # cutoff_by_location は CLI が constants.EP370G_START_DATETIMES から runtime 注入。
  - name: filter_by_location_cutoff
    enabled: true
    adr: decision-012
    params:
      id_col: 管理No
      datetime_col: dailygraphpt_ptdatetime

  # L-02 (ADR-001): 500h 点検影響のある初期データを除外。
  - name: filter_cumulative_runtime
    enabled: true
    adr: decision-001
    params:
      runtime_col: 累積運転時間
      min_hours: 1000

  # ADR-009: 要求電圧 6 列を縦持ちに展開。管理No_プラグNo / プラグNo を生成。
  - name: melt_voltage_columns
    enabled: true
    adr: decision-009
    params:
      location_no_col: 管理No
      voltage_cols:
        - 要求電圧_1
        - 要求電圧_2
        - 要求電圧_3
        - 要求電圧_4
        - 要求電圧_5
        - 要求電圧_6

  # ADR-015: センサー飽和値 32767（int16最大値、通信エラー時ダミー）を除外。
  # melt 後の縦持ち状態で適用。要求電圧列が単一列になっているため除外が明確。
  - name: filter_voltage_sensor_saturation
    enabled: true
    adr: decision-015
    params:
      voltage_col: 要求電圧
      saturation_value: 32767

  # L-03 + L-08 (ADR-011): プラグ単位の除外。
  #   9221_4: プラグ交換疑い
  #   9140_6 / 9141_6: センサー異常（常時欠損）
  - name: exclude_location_plug
    enabled: true
    adr: decision-011
    params:
      id_col: 管理No_プラグNo
      excluded:
        - "9221_4"
        - "9140_6"
        - "9141_6"

  # ADR-014: 行日時 → gen_no 付与。events_by_location は CLI が runtime 注入。
  - name: assign_generation
    enabled: true
    adr: decision-014
    params:
      id_col: 管理No
      datetime_col: dailygraphpt_ptdatetime

  # ADR-014 §C-4: (target_no, gen_no) ごとに baseline を計算し broadcast。
  - name: compute_baseline
    enabled: true
    adr: decision-014
    params:
      id_col: 管理No
      gen_col: gen_no
      datetime_col: dailygraphpt_ptdatetime
      voltage_col: 要求電圧
      power_col: 発電機電力
      baseline_days: 30
      min_active_days: 7
